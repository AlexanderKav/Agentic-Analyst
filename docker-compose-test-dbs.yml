# docker-compose-test-dbs.yml
services:
  # PostgreSQL Database
  postgres-test:
    image: postgres:15-alpine
    container_name: agentic-analyst-postgres-test
    environment:
      POSTGRES_DB: sales_db
      POSTGRES_USER: analyst_user
      POSTGRES_PASSWORD: analyst_pass123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"  # Changed from 5432 to 5433 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - test-db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst_user -d sales_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database
  mysql-test:
    image: mysql:8.0
    container_name: agentic-analyst-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: sales_db
      MYSQL_USER: analyst_user
      MYSQL_PASSWORD: analyst_pass123
    ports:
      - "3307:3306"  # Changed from 3306 to 3307 to avoid conflicts
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - test-db-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mysql_data:

networks:
  test-db-network:
    driver: bridge