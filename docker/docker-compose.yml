version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agentic-analyst-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analyst_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analyst_pass123}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_analyst}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analyst_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic_network

  redis:
    image: redis:7-alpine
    container_name: agentic-analyst-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic_network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: agentic-analyst-app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-analyst_user}:${POSTGRES_PASSWORD:-analyst_pass123}@postgres:5432/${POSTGRES_DB:-agentic_analyst}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/__pycache__
    networks:
      - agentic_network

networks:
  agentic_network:
    driver: bridge

volumes:
  postgres_data: