services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: agentic-analyst-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-agentic_analyst}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - AUDIT_SECRET_KEY=${AUDIT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SECRETS_BACKEND=${SECRETS_BACKEND:-local}
      - SECRETS_FILE=/app/data/secrets.enc
      - SECRETS_KEY_FILE=/app/data/secrets.key
      - SECRETS_MASTER_PASSWORD=${SECRETS_MASTER_PASSWORD}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - KEY_ROTATION_DAYS=${KEY_ROTATION_DAYS:-90}
      - KEY_GRACE_PERIOD_DAYS=${KEY_GRACE_PERIOD_DAYS:-1}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME:-Agentic Analyst}
      # Google Sheets credentials
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/google-credentials.json
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_charts:/app/agents/charts
      - app_data:/app/data
      # Mount Google credentials file (update the filename to match your actual file)
      - ../agentic-analyst-489012-a0aa86d33643.json:/app/credentials/google-credentials.json:ro
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: agentic-analyst-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-agentic_analyst}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: agentic-analyst-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  agentic-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_charts:
    driver: local
  app_data:
    driver: local